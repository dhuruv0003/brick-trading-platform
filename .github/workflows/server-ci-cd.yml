name: Server CI/CD

# Runs only when files inside server/ (or this workflow itself) change.
on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/server-ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/server-ci-cd.yml"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: server

env:
  NODE_VERSION: "20"
  IMAGE_NAME: ghcr.io/${{ github.repository }}/server

jobs:
  # ---------------------------------------------------------
  # CI: install dependencies and verify the app is well-formed
  # (no test suite exists yet, so this validates syntax +
  # that the entry file loads its dependency graph correctly)
  # ---------------------------------------------------------
  build:
    name: Install & Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check all source files
        run: find src -name "*.js" -print0 | xargs -0 -n1 node --check

      - name: Verify entry point resolves (dry parse, no server start)
        run: node -e "require('module')._resolveFilename('./src/server.js', { paths: ['.'] }); console.log('Entry point resolves OK')"

  # ---------------------------------------------------------
  # CD: build & publish a Docker image (only on push to main)
  # ---------------------------------------------------------
  docker:
    name: Build & Push Docker Image
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------------------------------------------------------
      # Optional: deploy step placeholder.
      # Uncomment and configure once you have a hosting target
      # (e.g. SSH into a VPS, trigger Render/Railway deploy hook, etc.)
      # ---------------------------------------------------------
      # - name: Deploy
      #   run: echo "Add your deployment commands here"